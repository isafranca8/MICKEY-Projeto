<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickey+ - Cadastro</title>
    <link rel="stylesheet" href="LOGIN.CSS">
    <link rel= "icon" href="img/logo_vermelho.png" type=" image/x-icon"/>

</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Cadastro</h1>
            <img src="img/logopng.png" alt="logo do site" width="110px" height="100px">
        </div>

        <form action="planos.html">
            <div class="input-group">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            <div class="input-group">
                <label for="data">Data de Nascimento:</label>
                <input type="date" id="data" name="data" required>
            </div>
             <div class="input-group">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf">
            </div>
            <div class="input-group">
                <label for="email">Telefone:</label>
                <input type="text" id="telefone" name="telefone">
            </div>
            <div class="input-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="input-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            <div class="input-group">
                <label for="confirmar-senha">Confirmar Senha:</label>
                <input type="password" id="confirmar-senha" name="confirmar-senha" required>
            </div>
            <div class="input-group">
                <label for="sexo">Escolha um plano:</label>
                <select id="sexo" name="sexo">
                    <option value="grut">🔴 Plano Grut – O Broto do Streaming</option>
                    <option value="bella">🟡 Plano Bela – O Encanto do Streaming</option>
                    <option value="grut">🔵 Plano Sullivan – O Gigante do Streaming</option>
                </select>
            </div>
            <div class="input-group">
                <label for="termos">
                    <input type="checkbox" id="termos" name="termos" required> Aceito os termos e condições.
                </label>
            </div>
                <button type="submit" class="submit-btn">Cadastrar</button>
                <p class="pagina">Você já tem uma conta?<a href="login.html"> Então faça o seu login aqui</a></p>
        </form>
    </div>
    
    
</body>
</html>
