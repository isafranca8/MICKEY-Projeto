<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickey+ - Login</title>
    <link rel="stylesheet" href="LOGIN.CSS">
    <link rel= "icon" href="img/logo_vermelho.png" type=" image/x-icon" />

</head>
<body>

     <div class="container">
        <div class="logo">
            <h1>Login</h1>
            <img src="img/logoquadrado.png" alt="logo do site" width="110px" height="100px">
        </div>
        
        <form action="home.html">
            <div class="input-group">
                <label for="email-login">E-mail:</label> <!--Campo-->
                <input type="email" id="email-login" name="email-login" required> <!--Caixa de texto-->
            </div>
            <div class="input-group">
                <label for="senha-login">Senha:</label>
                <input type="password" id="senha-login" name="senha-login" required>
            </div>
                <button type="submit" class="submit-btn">Entrar</button>
                <p class="pagina">Você ainda não tem uma conta no MICKEY+?<a href="cadastro.html"> Cadastra-se Aqui!</a></p>
        </form>
    </div>
    
</body>
</html>
