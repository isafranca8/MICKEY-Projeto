  <style>
    body {
      margin: 0;
      font-family:Verdana, Geneva, Tahoma, sans-serif;
      background-color: rgb(63, 13, 13);;
      color: white;
    }
    .navbar {
      display: flex;              
      justify-content: space-between;
      align-items: center;        
      padding: 15px 30px;
      background-color: rgba(14, 6, 6, 0.884);    
      color: rgb(255, 254, 254);
      position: fixed;    
      top: 0;
      left: 0;        
      width: 100%;
      z-index: 1000;              
    }
     .logo img {
      height: 60px;  
    }
    .menu a {
    margin-left: 20px;
    text-decoration: none;
    color: rgb(231, 208, 102);
    font-weight: bold;
    transition: color 0.3s;
  }


   .menu a:hover {
    color: rgb(148, 32, 28);
   }
   .titulo {
  text-align: center;
  color: rgb(194, 48, 111);
  margin: 20px 0;
  padding-top: 80px;
  color: rgb(206, 201, 130);
}


.minhalista {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  padding: 160px;
}
.card {
      background: rgba(20, 20, 20, 0.9);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      height: 600px;
    }
    .card img {
      width: 100%;
      display: block;
      height: 550px;
    }
    .card-content {
      padding: 10px;
      text-align: center;
       margin-top: auto;
    }
    .card-content h3 {
      font-size: 16px;
      margin: 10px 0 0;
      color: rgb(231, 208, 102);
    }
    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 20px rgba(153, 32, 32, 0.6);
    }
    .play-icon {
      font-size: 20px;
      color: white;
    }
</style>
</head>
